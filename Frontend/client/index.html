<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Billing App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100">

<div class="max-w-5xl mx-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Billing App</h1>
      <p class="text-sm text-gray-600">Dashboard</p>
    </div>
    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <a href="products.html" class="bg-white p-6 rounded shadow hover:shadow-md">
      <h2 class="text-xl font-bold mb-2">Products</h2>
      <p class="text-gray-600">Add, edit, and delete products.</p>
    </a>

    <a href="billing.html" class="bg-white p-6 rounded shadow hover:shadow-md">
      <h2 class="text-xl font-bold mb-2">Billing</h2>
      <p class="text-gray-600">Create bills and invoices.</p>
    </a>

    <a href="reports.html" class="bg-white p-6 rounded shadow hover:shadow-md">
      <h2 class="text-xl font-bold mb-2">Reports</h2>
      <p class="text-gray-600">View saved bill reports.</p>
    </a>
  </div>
</div>

<script>
  if (localStorage.getItem("token") !== "loggedin") {
    window.location.href = "login.html";
  }

  function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
  }
</script>
</body>
</html>
