<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex justify-center items-center h-screen bg-gray-100">

<div class="bg-white p-6 rounded shadow w-80">
  <h2 class="text-xl font-bold mb-4">Login</h2>

  <input id="email" placeholder="Email" class="border p-2 w-full mb-3">
  <input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-3">

  <button onclick="login()" class="bg-blue-500 text-white w-full p-2">Login</button>
  <p id="authMessage" class="text-sm text-red-600 mt-3"></p>

  <p class="mt-3 text-center">
    <a href="register.html">Register Here</a>
  </p>
</div>

<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
