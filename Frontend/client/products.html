<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Products</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<h2 class="text-xl font-bold mb-4">Products</h2>

<div class="bg-white p-4 rounded shadow mb-4">
  <input id="name" placeholder="Name" class="border p-2 mr-2">
  <input id="price" type="number" placeholder="Price" class="border p-2 mr-2">
  <input id="tax" type="number" placeholder="Tax %" class="border p-2 mr-2">
  <button onclick="addProduct()" class="bg-blue-500 text-white px-4">Add</button>
</div>

<table class="w-full bg-white shadow">
  <thead class="bg-gray-200">
    <tr>
      <th>Name</th><th>Price</th><th>Tax</th><th>Actions</th>
    </tr>
  </thead>
  <tbody id="productTable"></tbody>
</table>

<script src="../js/config.js"></script>
<script src="../js/products.js"></script>
</body>
</html>
